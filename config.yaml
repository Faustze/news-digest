# ─────────────────────────────────────────────
# news_pipeline config
# ─────────────────────────────────────────────

topics:
  - Vue.js ecosystem (Vue 3, Vite, Vue Router, Pinia, Vue devtools)
  - Nuxt.js framework (Nuxt 3, Nuxt modules, Nitro, server-side rendering)
  - Nuxt UI, Vuetify, PrimeVue — Vue component libraries
  - HTML5, CSS3, SCSS, CSS variables, CSS Grid, Flexbox
  - UnoCSS, Tailwind CSS, utility-first CSS
  - JavaScript and TypeScript for web development
  - Web performance, Core Web Vitals, accessibility
  - AI tools for developers (Copilot, Cursor, v0, Claude, AI code generation)
  - AI integration in web apps (chatbots, embeddings, APIs)
  - Web development best practices, tooling, DX
  - npm, pnpm, package ecosystem news relevant to frontend

output_dir: output
cutoff_hours: 24
max_items: 15
batch_size: 12

model: llama-3.3-70b-versatile

feeds:

  # ── Core ecosystem ──────────────────────────
  - name: Vue.js Blog
    url: https://blog.vuejs.org/feed.rss
    tags: [Vue, frontend]

  - name: Nuxt.js Blog
    url: https://nuxt.com/blog/feed.xml
    tags: [Nuxt, Vue, frontend]

  - name: Vite Blog
    url: https://vite.dev/blog/rss.xml
    tags: [Vite, frontend, tooling]

  - name: Node.js Blog
    url: https://nodejs.org/en/feed/blog.xml
    tags: [Node, JavaScript, ecosystem]

  - name: Vuetify Blog
    url: https://vuetifyjs.com/blog/feed.xml
    tags: [Vuetify, Vue, frontend]

  # ── CSS / Styling ───────────────────────────
